<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">

    <!--     Copie essa parte e insira no head do HTML pai -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://blog.kabum.com.br/wp-content/themes/kabum-v2.0/assets/lib/Fontawesome/css/all.min.css?ver=1.0"
        as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uikit@3.18.0/dist/css/uikit.min.css" />
    <link rel="stylesheet" href="css/kabum-css.css">
</head>

<body>
    <!-- Copie a tag section toda, até o script na parte de baixo -->
    <section id="kabum-button">
        <button type="button" class="kabum-review p-2" data-state="open">

            <!-- Aqui troca o nome do titulo da sessão -->
            <span><i class="fa-solid fa-magnifying-glass"></i>
                VÍDEOS, UNBOXING, REVIEWS & MAIS
            </span>

            <svg width="13" height="8" viewBox="0 0 13 8" fill="none" xmlns="https://www.w3.org/2000/svg"
                id="arrow-review" data-state="close" aria-hidden="true">
                <path fill-rule="evenodd" clip-rule="evenodd"
                    d="M12.0459 1.54599L10.955 0.455078L6.0459 5.36417L1.13681 0.455078L0.0458984 1.54599L6.0459 7.54599L12.0459 1.54599Z"
                    fill="#ff6500" aria-hidden="true"></path>
            </svg>
        </button>


        <div id="mainVideo" class="uk-position-relative uk-visible-toggle uk-light uk-margin-top" tabindex="-1"
            uk-slider="center: true">
                   
                <div class="uk-slider-items uk-grid">
                    <div class="uk-width-xlarge">
                        <div class="uk-panel">
                            <div class="kabum-thumbnail-wrapper">

                                <img class="video-thumbnail cr-card" src="img/ajax-loader.gif" alt="Thumbnail do kabum-review do Produto">

                                <div class="kabum-play-icon-overlay">
                                    <i class="fab fa-youtube"></i>
                                </div>


                            </div>
                        </div>
                    </div>
                </div>
                <div class="prevNext">,
                    <a class="uk-position-center-left uk-position-small  uk-flex uk-flex-center " id="teste" href uk-slidenav-previous
                        uk-slider-item="previous"></a>
                    <a class="uk-position-center-right uk-position-small  uk-flex uk-flex-center" id="teste" href uk-slidenav-next
                        uk-slider-item="next"></a>

                </div>

            

            <ul class="uk-slider-nav uk-dotnav uk-flex-center uk-margin uk-dark"></ul>
        </div>

        <div class=" uk-margin-top kabum-review">

            <!-- Aqui troca o nome do titulo da segunda sessão -->
       <!--      <span><i class="fa-solid fa-globe "></i>
                EXPLORANDO O PRODUTO
            </span> -->

        </div>
        <script src="js/kabum-script.js"></script>
    <script>
      window.onload = function() {
        var script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/uikit@3.18.0/dist/js/uikit.min.js';
        document.documentElement.appendChild(script);
      };
    </script>
        
    </section>
    
    <!-- Até aqui -->
</body>


<!-- <script src="https://cdn.jsdelivr.net/npm/uikit@3.18.0/dist/js/uikit.min.js" async></script>
 -->
</html>
